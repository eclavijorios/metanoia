services:
  postgres:
    image: postgres:16-alpine
    container_name: metanoia-db
    environment:
      POSTGRES_DB: metanoia
      POSTGRES_USER: metanoia
      POSTGRES_PASSWORD: metanoia_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metanoia"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
